<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="icon" href="{{relativeRoot}}favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{{relativeRoot}}prism.css">
    <link rel="stylesheet" href="{{relativeRoot}}style.css">
  </head>
  <body>
    <header>
      <a
        href="{{relativeRoot}}index.html"
        style="font-weight: bold; font-size: 1.2rem; color: inherit"
      >{{siteTitle}}</a>
      <nav>
        <a href="{{relativeRoot}}about.html" style="margin-left: 15px">About</a>
      </nav>
    </header>
    <main>
      {{titleHtml}} {{dateHtml}} {{content}}
    </main>
    <footer>
      <p>&copy; {{year}} {{siteTitle}}.</p>
    </footer>

    <script src="{{relativeRoot}}prism.js"></script>
    {{extraScripts}}
  </body>
</html>
